services:
  # 1. Flask Backend Web Service
  - type: web
    name: kisanai360-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --chdir backend app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

  # 2. React Frontend Static Site
  - type: web
    name: kisanai360-frontend
    runtime: static
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    publishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        # Redirect all frontend API calls to the live Flask backend web service
        destination: https://kisanai360-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
